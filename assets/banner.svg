<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00a8e8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)"/>

  <!-- Glow effect -->
  <ellipse cx="600" cy="0" rx="400" ry="150" fill="url(#glow)"/>

  <!-- Sensor wave visualization -->
  <g opacity="0.12" stroke="#00d4aa" stroke-width="1" fill="none">
    <path d="M0,200 Q100,180 200,200 T400,200 T600,200 T800,200 T1000,200 T1200,200"/>
    <path d="M0,210 Q150,185 300,210 T600,210 T900,210 T1200,210"/>
    <path d="M0,220 Q200,195 400,220 T800,220 T1200,220"/>
  </g>

  <!-- NeoSense title -->
  <text x="600" y="125" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="2">
    <tspan fill="#ffffff">Neo</tspan><tspan fill="url(#accent)">Sense</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="170" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="300" fill="#888888" letter-spacing="6">
    SOMATIC INTELLIGENCE LOGGER
  </text>

  <!-- Divider -->
  <rect x="520" y="190" width="160" height="1" fill="url(#accent)" opacity="0.4"/>

  <!-- NeoMakes brand -->
  <text x="600" y="230" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="400" fill="#555555" letter-spacing="3">
    BY NEOMAKES
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="298" width="1200" height="2" fill="url(#accent)"/>
</svg>